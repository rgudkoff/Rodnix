name: Smoke

on:
  workflow_dispatch:

jobs:
  qemu-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            nasm \
            qemu-system-x86 \
            grub-pc-bin \
            grub-common \
            xorriso \
            mtools \
            python3

      - name: Set up cross-compiler shims
        run: |
          # Ubuntu ships gcc targeting x86_64-linux-gnu.  With -ffreestanding
          # -nostdlib the output is bare-metal compatible.  We expose it under
          # the x86_64-elf- prefix that the Makefile expects.
          mkdir -p "$HOME/.local/bin"
          for tool in gcc ld objcopy objdump nm ar; do
            if command -v "x86_64-linux-gnu-${tool}" >/dev/null 2>&1; then
              ln -sf "$(command -v x86_64-linux-gnu-${tool})" \
                     "$HOME/.local/bin/x86_64-elf-${tool}"
            elif command -v "${tool}" >/dev/null 2>&1; then
              ln -sf "$(command -v ${tool})" \
                     "$HOME/.local/bin/x86_64-elf-${tool}"
            fi
          done
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify toolchain
        run: |
          x86_64-elf-gcc --version
          x86_64-elf-ld --version
          grub-mkrescue --version || true

      - name: Run Smoke
        run: |
          TIMEOUT_SEC=30 scripts/ci/smoke_qemu.sh

      - name: Upload Boot Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boot-log
          path: boot.log
          if-no-files-found: ignore
